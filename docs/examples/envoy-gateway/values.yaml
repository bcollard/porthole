# Helm values for porthole when fronted by Envoy Gateway under a
# shared API hostname at a sub-path. Tweak hostname + pathPrefix
# to match where your platform team wants it to live.
#
# Pair with envoy-gateway-securitypolicy.yaml (applied separately —
# it's an Envoy-Gateway-specific CR and shouldn't ship in this chart).

auth:
  disabled: false
  # Real values come from --set on the install command line.
  # jwksURL: "https://kc.example.com/realms/porthole/protocol/openid-connect/certs"
  # issuer:  "https://kc.example.com/realms/porthole"

# Origin is scheme+host only — no path component. CSWSH defence.
wsAllowedOrigins: "https://api.example.com"

opa:
  enabled: true

ecSweepTTL: "30m"

gatewayAPI:
  enabled: true
  hostnames:
    - api.example.com           # shared API gateway hostname
  parentRefs:
    - name: eg                  # name of the platform-managed Gateway
      namespace: default        # adjust if it lives elsewhere
  # Public sub-path. Set to "/" if porthole owns its own hostname.
  # Chart emits a 308 redirect /porthole → /porthole/ plus a
  # URLRewrite that strips /porthole before forwarding upstream.
  pathPrefix: /porthole
