# Helm values for porthole when fronted by Envoy Gateway.
#
# Pair with envoy-gateway-securitypolicy.yaml (applied separately —
# it's an Envoy-Gateway-specific CR and shouldn't ship in this chart).
#
# Replace the hostnames and the parentRefs to match your Gateway.

auth:
  disabled: false
  # Real values come from --set on the install command line.
  # jwksURL: "https://kc.example.com/realms/porthole/protocol/openid-connect/certs"
  # issuer:  "https://kc.example.com/realms/porthole"

wsAllowedOrigins: "https://porthole.example.com"

opa:
  enabled: true

ecSweepTTL: "30m"

gatewayAPI:
  enabled: true
  hostnames:
    - porthole.example.com
  parentRefs:
    - name: eg              # name of the Gateway you already created
      namespace: default    # adjust if it lives elsewhere
