# Envoy Gateway OIDC SecurityPolicy for porthole.
#
# Applied separately from the porthole helm chart — the chart is
# gateway-implementation neutral and stays free of EG-specific CRDs.
#
# This example assumes porthole lives at api.example.com/porthole/.
# Two URLs must include that prefix and stay in sync everywhere:
#
#   1. spec.oidc.redirectURL below
#   2. the OAuth client's `redirectUris` list in Keycloak
#      (scripts/keycloak-bootstrap.sh accepts REDIRECT_URI for this)
#
# Mismatch → Keycloak refuses with "Invalid parameter: redirect_uri".
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: porthole
  namespace: default
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: porthole
  oidc:
    provider:
      issuer: "https://keycloak.example.com/realms/porthole"
    clientID: "porthole"
    clientSecret:
      name: porthole-oidc
    redirectURL: "https://api.example.com/porthole/oauth2/callback"
    logoutPath: "/porthole/logout"
    scopes:
      - openid
      - profile
      - email
    # Forward the access_token as Authorization: Bearer …, which the
    # porthole JWT middleware then validates.
    forwardAccessToken: true
