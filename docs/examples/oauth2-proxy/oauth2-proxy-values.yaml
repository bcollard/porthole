# Helm values for the oauth2-proxy chart, sized for the porthole
# example. Repo: https://oauth2-proxy.github.io/oauth2-proxy/
#
# Real secrets (clientID / clientSecret / cookieSecret) come from
# --set on the install command line — don't commit them.

config:
  # clientID / clientSecret / cookieSecret are injected via --set.
  # cookieSecret must be 32 bytes (base64-url, no padding):
  #   openssl rand -base64 32 | tr -- '+/' '-_' | tr -d '='

  configFile: |-
    # ---------- OIDC provider ----------
    provider = "oidc"
    oidc_issuer_url = "https://keycloak.example.com/realms/porthole"
    scope = "openid profile email groups"

    # ---------- audience ----------
    redirect_url = "https://porthole.example.com/oauth2/callback"
    email_domains = ["*"]

    # ---------- header passing ----------
    # Forward "Authorization: Bearer <id_token>" upstream. The
    # porthole JWT middleware then verifies that token against the
    # Keycloak JWKS — oauth2-proxy stays the OIDC client, porthole
    # stays the resource server.
    set_authorization_header = true
    pass_authorization_header = true
    pass_access_token = false      # we want the id_token, not access
    skip_auth_strip_headers = false

    # ---------- session ----------
    cookie_secure = true
    cookie_samesite = "lax"
    cookie_refresh = "55m"
    cookie_expire = "8h"

ingress:
  enabled: true
  className: nginx
  # Same hostname as porthole — oauth2-proxy lives at /oauth2/*.
  path: /oauth2
  pathType: Prefix
  hosts:
    - porthole.example.com
  tls:
    - secretName: porthole-tls
      hosts: [porthole.example.com]
