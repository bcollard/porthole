# Copy to secret.yaml, fill in the client-secret produced by
# scripts/keycloak-bootstrap.sh, then `kubectl apply -f secret.yaml`.
# Do NOT commit the real secret.
apiVersion: v1
kind: Secret
metadata:
  name: porthole-oidc-secret
  namespace: default
type: Opaque
stringData:
  client-secret: "REPLACE_ME"
