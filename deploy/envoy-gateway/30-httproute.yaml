apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: porthole
  namespace: default
spec:
  parentRefs:
    - name: porthole-gateway
  hostnames:
    - "porthole.bco.runlocal.dev"
  rules:
    # Everything — SPA, REST, /term/* WS upgrade — lands on the single
    # Porthole port. Envoy Gateway handles WebSocket upgrades natively
    # on HTTP(S) listeners.
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: porthole
          port: 8081
