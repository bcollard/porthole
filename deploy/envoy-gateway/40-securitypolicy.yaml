# OIDC SecurityPolicy for Porthole.
#
# The intent — per Baptiste's design — is to forward the *id_token*
# upstream in a custom header named X-ID-Token, so Porthole can verify
# the JWT and feed claims (sub, email, groups) into OPA.
#
# As of Envoy Gateway v1.6, the SecurityPolicy.oidc.forwardIDToken
# field exists in the v1alpha1 API but is marked `+notImplementedHide`
# in the source. That means the field is *declared* but the gateway
# controller does not yet wire it through to Envoy. See:
#   https://github.com/envoyproxy/gateway/blob/main/api/v1alpha1/oidc_types.go
#
# We write the intended config below. When EG ships the implementation
# the line below the marker will start taking effect; until then we
# also enable forwardAccessToken so that Porthole has *a* JWT to
# validate (Keycloak's access_token includes the same identity claims
# when the client has the openid+profile+email scopes mapped — which
# the bootstrap script ensures).
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: porthole-oidc
  namespace: default
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: porthole
  oidc:
    provider:
      issuer: "https://keycloak.kong.runlocal.dev/realms/porthole"
    clientID: "porthole"
    clientSecret:
      name: porthole-oidc-secret
    redirectURL: "https://porthole.bco.runlocal.dev/oauth2/callback"
    logoutPath: "/logout"
    scopes:
      - openid
      - profile
      - email
    # === preferred — pending EG implementation ===
    # forwardIDToken:
    #   header: X-ID-Token
    # === fallback that works today: Authorization: Bearer <access_token> ===
    forwardAccessToken: true
