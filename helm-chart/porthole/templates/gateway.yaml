{{- if .Values.gateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ include "porthole.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "porthole.labels" . | nindent 4 }}
spec:
  gatewayClassName: {{ .Values.gateway.className }}
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      hostname: {{ .Values.gateway.hostname | quote }}
      allowedRoutes:
        namespaces:
          from: Same
    {{- if .Values.gateway.tlsSecretName }}
    - name: https
      protocol: HTTPS
      port: 443
      hostname: {{ .Values.gateway.hostname | quote }}
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: {{ .Values.gateway.tlsSecretName }}
      allowedRoutes:
        namespaces:
          from: Same
    {{- end }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "porthole.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "porthole.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ include "porthole.fullname" . }}
  hostnames:
    - {{ .Values.gateway.hostname | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "porthole.fullname" . }}
          port: {{ .Values.service.port }}
{{- end }}
