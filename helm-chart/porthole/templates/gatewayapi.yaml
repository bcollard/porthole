{{- if .Values.gatewayAPI.enabled }}
{{- if .Values.gatewayAPI.gateway.create }}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ include "porthole.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "porthole.labels" . | nindent 4 }}
spec:
  gatewayClassName: {{ required "gatewayAPI.gateway.className is required when gateway.create=true" .Values.gatewayAPI.gateway.className }}
  listeners:
    - name: {{ .Values.gatewayAPI.gateway.listenerName }}
      protocol: {{ .Values.gatewayAPI.gateway.protocol }}
      port: {{ .Values.gatewayAPI.gateway.port }}
      {{- if .Values.gatewayAPI.gateway.tlsSecretName }}
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: {{ .Values.gatewayAPI.gateway.tlsSecretName }}
      {{- end }}
      allowedRoutes:
        namespaces:
          from: Same
---
{{- end }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "porthole.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "porthole.labels" . | nindent 4 }}
spec:
  parentRefs:
    {{- if .Values.gatewayAPI.gateway.create }}
    - name: {{ include "porthole.fullname" . }}
    {{- else }}
    {{- toYaml .Values.gatewayAPI.parentRefs | nindent 4 }}
    {{- end }}
  hostnames:
    {{- range .Values.gatewayAPI.hostnames }}
    - {{ . | quote }}
    {{- end }}
  rules:
    {{- $prefix := .Values.gatewayAPI.pathPrefix | default "/" }}
    {{- if ne $prefix "/" }}
    {{- $stripped := trimSuffix "/" $prefix }}
    # Canonicalize trailing slash: /<prefix> → /<prefix>/. Without
    # this, a redirect-Location like "ui/" returned by porthole
    # would resolve to /ui/ at the public origin (404 at the
    # gateway) instead of /<prefix>/ui/.
    - matches:
        - path:
            type: Exact
            value: {{ $stripped | quote }}
      filters:
        - type: RequestRedirect
          requestRedirect:
            path:
              type: ReplaceFullPath
              replaceFullPath: {{ printf "%s/" $stripped | quote }}
            statusCode: 308
    # Sub-path routing: strip the public prefix before forwarding so
    # porthole keeps serving at root and stays prefix-agnostic.
    - matches:
        - path:
            type: PathPrefix
            value: {{ $stripped | quote }}
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: {{ include "porthole.fullname" . }}
          port: {{ .Values.service.port }}
    {{- else }}
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "porthole.fullname" . }}
          port: {{ .Values.service.port }}
    {{- end }}
{{- end }}
